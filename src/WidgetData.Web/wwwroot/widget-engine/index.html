<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Data – Home</title>

  <!-- WidgetEngine styles -->
  <link rel="stylesheet" href="widget-engine/widget-engine.css">

  <style>
    /* ── Page chrome ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: #2d3748;
      color: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }

    header .logo {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .5px;
    }

    header nav a {
      color: #cbd5e0;
      text-decoration: none;
      font-size: 14px;
      margin-left: 20px;
      transition: color .15s;
    }

    header nav a:hover { color: #fff; }

    header .user-info {
      font-size: 13px;
      color: #a0aec0;
    }

    #btn-logout {
      margin-left: 12px;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #a0aec0;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    #btn-logout:hover {
      border-color: #a0aec0;
      color: #fff;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Nav tabs for switching pages ───────────────── */
    .page-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0;
    }

    .page-tab {
      padding: 8px 18px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: #718096;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 4px 4px 0 0;
      transition: color .15s;
    }

    .page-tab:hover { color: #2d3748; }

    .page-tab.active {
      color: #4299e1;
      border-bottom-color: #4299e1;
    }

    /* ── Metric widget style (used by dashboard.json inline templates) */
    .we-metric {
      text-align: center;
      padding: 20px 10px;
    }

    .we-metric-value {
      display: block;
      font-size: 32px;
      font-weight: 700;
      color: #2b6cb0;
    }

    .we-metric-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #718096;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <span class="logo">📊 Widget Data</span>

    <nav>
      <a href="#" data-page="pages/home.json" onclick="switchPage(this, event)">Home</a>
      <a href="#" data-page="pages/dashboard.json" onclick="switchPage(this, event)">Sales Dashboard</a>
    </nav>

    <div class="user-info" id="user-info" hidden>
      <span id="user-email"></span>
      <button id="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <!-- Page switcher tabs (hidden until logged in) -->
    <div class="page-tabs" id="page-tabs" hidden>
      <button class="page-tab active" data-page="pages/home.json" onclick="switchTab(this)">Home</button>
      <button class="page-tab" data-page="pages/dashboard.json" onclick="switchTab(this)">Sales Dashboard</button>
    </div>

    <!-- Dynamic content area -->
    <div id="app"></div>
  </main>

  <!-- ── WidgetEngine library ── -->
  <script src="widget-engine/widget-engine.js"></script>

  <script>
    /* =======================================================
     * App bootstrap
     * ===================================================== */
    const API_BASE_URL = 'https://localhost:7001/api';

    // 1. Initialise the engine (reads token from sessionStorage if present)
    WidgetEngine.init({
      baseUrl: API_BASE_URL,
      autoRefresh: true,
      token: sessionStorage.getItem('we_token') || undefined,
      refreshToken: sessionStorage.getItem('we_refresh') || undefined,
      tokenExpiresAt: sessionStorage.getItem('we_expires') || undefined,
    });

    // Persist token on login
    const _origLogin = WidgetEngine.auth.login.bind(WidgetEngine.auth);
    WidgetEngine.auth.login = async function(email, password) {
      const data = await _origLogin(email, password);
      sessionStorage.setItem('we_token', data.token);
      sessionStorage.setItem('we_refresh', data.refreshToken || '');
      sessionStorage.setItem('we_expires', data.expiresAt || '');
      showUserBar(email);
      return data;
    };

    // 2. Load the home page
    WidgetEngine.page.load('pages/home.json', document.getElementById('app'))
      .then(() => {
        if (WidgetEngine.auth.isAuthenticated()) showPageTabs();
      });

    /* =======================================================
     * UI helpers
     * ===================================================== */
    function showUserBar(email) {
      document.getElementById('user-email').textContent = email;
      document.getElementById('user-info').hidden = false;
      showPageTabs();
    }

    function showPageTabs() {
      document.getElementById('page-tabs').hidden = false;
    }

    function logout() {
      WidgetEngine.auth.logout();
      sessionStorage.removeItem('we_token');
      sessionStorage.removeItem('we_refresh');
      sessionStorage.removeItem('we_expires');
      document.getElementById('user-info').hidden = true;
      document.getElementById('page-tabs').hidden = true;
      WidgetEngine.page.load('pages/home.json', document.getElementById('app'));
    }

    function switchPage(link, e) {
      e.preventDefault();
      const pageUrl = link.dataset.page;
      WidgetEngine.page.load(pageUrl, document.getElementById('app'))
        .then(() => { if (WidgetEngine.auth.isAuthenticated()) showPageTabs(); });
    }

    function switchTab(btn) {
      document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      WidgetEngine.page.load(btn.dataset.page, document.getElementById('app'));
    }
  </script>

</body>
</html>
