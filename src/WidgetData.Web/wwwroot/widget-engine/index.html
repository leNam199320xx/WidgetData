<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WidgetData – Nền tảng dữ liệu thông minh</title>

  <!-- WidgetEngine styles -->
  <link rel="stylesheet" href="widget-engine/widget-engine.css">
  <!-- Page styles -->
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ── Header / Navigation ── -->
  <header>
    <span class="logo">📊 WidgetData</span>

    <nav>
      <a href="#" data-page="pages/home.json"     onclick="switchPage(this, event)">Trang chủ</a>
      <a href="#" data-page="pages/products.json" onclick="switchPage(this, event)">Sản phẩm</a>
      <a href="#" data-page="pages/pricing.json"  onclick="switchPage(this, event)">Bảng giá</a>
    </nav>

    <div class="header-right">
      <a class="nav-cta" href="#" data-page="pages/products.json" onclick="switchPage(this, event)">Dùng thử miễn phí</a>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <div id="app"></div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>© 2026 WidgetData. Mọi quyền được bảo lưu.</p>
  </footer>

  <!-- ── WidgetEngine library ── -->
  <script src="widget-engine/widget-engine.js"></script>

  <script>
    /* =======================================================
     * App bootstrap – landing / product / sales pages
     * No auth required for public content.
     * ===================================================== */

    // Init without baseUrl – public pages use staticData only.
    WidgetEngine.init({ baseUrl: '' });

    // Load the home landing page on startup
    WidgetEngine.page.load('pages/home.json', document.getElementById('app'));

    /* --- Navigation ---------------------------------------- */
    function switchPage(link, e) {
      e.preventDefault();
      document.querySelectorAll('header nav a, header .nav-cta').forEach(a => a.classList.remove('active'));
      link.classList.add('active');
      WidgetEngine.page.load(link.dataset.page, document.getElementById('app'))
        .then(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }

    // Mark initial active link
    document.querySelector('header nav a[data-page="pages/home.json"]')?.classList.add('active');
  </script>

</body>
</html>
