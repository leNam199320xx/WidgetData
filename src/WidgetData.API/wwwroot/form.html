<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f7fafc; color: #1a202c; }
    .form-wrap { max-width: 560px; margin: 48px auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 32px 28px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    h2 { margin: 0 0 6px; font-size: 22px; }
    .desc { color: #718096; margin: 0 0 24px; font-size: 14px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #2d3748; }
    label .req { color: #e53e3e; margin-left: 2px; }
    input, textarea, select {
      width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 6px;
      font-size: 14px; background: #fff; transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,.15); }
    textarea { resize: vertical; min-height: 90px; }
    button[type=submit] {
      width: 100%; padding: 11px; background: #4299e1; color: #fff; border: none;
      border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    button[type=submit]:hover { background: #3182ce; }
    button[type=submit]:disabled { background: #a0aec0; cursor: not-allowed; }
    .msg { padding: 14px 18px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: none; }
    .msg.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; display: block; }
    .msg.error   { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; display: block; }
    #loading { text-align: center; padding: 40px; color: #a0aec0; }
  </style>
</head>
<body>
  <div class="form-wrap" id="form-wrap">
    <div id="loading">⏳ Đang tải form…</div>
  </div>

  <script>
    (async function () {
      // Read widgetId from URL: /form.html?id=5  or  /form.html?widgetId=5
      const params = new URLSearchParams(location.search);
      const widgetId = params.get('id') || params.get('widgetId');
      if (!widgetId) { document.getElementById('loading').textContent = '⚠ Thiếu tham số ?id=<widgetId>'; return; }

      // Resolve API base — same origin by default
      const base = params.get('api') || '';

      let schema;
      try {
        const res = await fetch(`${base}/api/form/${widgetId}/schema`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        schema = await res.json();
      } catch (e) {
        document.getElementById('loading').textContent = '❌ Không tải được schema: ' + e.message;
        return;
      }

      // Render form
      const wrap = document.getElementById('form-wrap');
      wrap.innerHTML = `
        <h2>${esc(schema.title)}</h2>
        ${schema.description ? `<p class="desc">${esc(schema.description)}</p>` : ''}
        <form id="wd-form"></form>
        <div class="msg" id="msg"></div>`;

      const form = document.getElementById('wd-form');
      for (const f of schema.fields || []) {
        const req = f.required ? '<span class="req">*</span>' : '';
        let input;
        if (f.type === 'textarea') {
          input = `<textarea name="${esc(f.name)}" placeholder="${esc(f.placeholder||'')}" ${f.required?'required':''}></textarea>`;
        } else if (f.type === 'select') {
          const opts = (f.options || '').split(';').map(o => `<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('');
          input = `<select name="${esc(f.name)}" ${f.required?'required':''}><option value="">-- Chọn --</option>${opts}</select>`;
        } else if (f.type === 'checkbox') {
          input = `<input type="checkbox" name="${esc(f.name)}" id="${esc(f.name)}" style="width:auto">`;
        } else {
          input = `<input type="${esc(f.type||'text')}" name="${esc(f.name)}" placeholder="${esc(f.placeholder||'')}" ${f.required?'required':''}>`;
        }
        form.insertAdjacentHTML('beforeend',
          `<div class="field"><label for="${esc(f.name)}">${esc(f.label)}${req}</label>${input}</div>`);
      }
      form.insertAdjacentHTML('beforeend', `<button type="submit" id="submit-btn">${esc(schema.submitLabel||'Gửi')}</button>`);

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        msg.className = 'msg';

        const data = {};
        new FormData(form).forEach((v, k) => { data[k] = v; });
        // Checkboxes not included in FormData when unchecked
        form.querySelectorAll('input[type=checkbox]').forEach(cb => { if (!data[cb.name]) data[cb.name] = 'false'; else data[cb.name] = 'true'; });

        try {
          const res = await fetch(`${base}/api/form/${widgetId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          const body = await res.json();
          if (res.ok) {
            form.reset();
            msg.textContent = schema.successMessage || 'Cảm ơn bạn đã gửi thông tin!';
            msg.className = 'msg success';
          } else {
            msg.textContent = body.error || 'Gửi thất bại, vui lòng thử lại.';
            msg.className = 'msg error';
            btn.disabled = false;
          }
        } catch (err) {
          msg.textContent = 'Lỗi kết nối: ' + err.message;
          msg.className = 'msg error';
          btn.disabled = false;
        }
      });
    })();

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
