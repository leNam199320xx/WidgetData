name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WidgetData.sln

      - name: Publish API
        run: dotnet publish src/WidgetData.API/WidgetData.API.csproj -c Release -o artifacts/api

      - name: Publish Worker
        run: dotnet publish src/WidgetData.Worker/WidgetData.Worker.csproj -c Release -o artifacts/worker

      - name: Publish Web
        run: dotnet publish src/WidgetData.Web/WidgetData.Web.csproj -c Release -o artifacts/web

      - name: Archive artifacts
        run: |
          cd artifacts
          zip -r api.zip api
          zip -r worker.zip worker
          zip -r web.zip web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            artifacts/api.zip
            artifacts/worker.zip
            artifacts/web.zip

  create-release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: release-artifacts
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/api.zip
            artifacts/worker.zip
            artifacts/web.zip
