name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WidgetData.sln

      - name: Build
        run: dotnet build WidgetData.sln --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test WidgetData.sln \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Enforce minimum coverage
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          files = glob.glob("TestResults/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("No coverage files found.")
              sys.exit(1)

          total_valid = 0
          total_covered = 0
          for file in files:
              root = ET.parse(file).getroot()
              total_valid += int(float(root.attrib.get("lines-valid", "0")))
              total_covered += int(float(root.attrib.get("lines-covered", "0")))

          if total_valid == 0:
              print("Coverage data has zero valid lines.")
              sys.exit(1)

          coverage = (total_covered / total_valid) * 100
          threshold = 20.0
          print(f"Combined coverage: {coverage:.2f}% (threshold: {threshold:.2f}%)")
          if coverage < threshold:
              sys.exit(1)
          PY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WidgetData.sln

      - name: Check vulnerable packages
        run: dotnet list WidgetData.sln package --vulnerable --include-transitive
