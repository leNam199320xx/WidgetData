<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WidgetData – Nền tảng dữ liệu thông minh</title>
  <link rel="stylesheet" href="lib/widget-engine.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <header>
    <span class="logo">📊 WidgetData</span>
    <nav>
      <a href="#" class="active" data-page="pages/home.json"     onclick="switchPage(this, event)">Trang chủ</a>
      <a href="#"               data-page="pages/products.json"  onclick="switchPage(this, event)">Sản phẩm</a>
      <a href="#"               data-page="pages/pricing.json"   onclick="switchPage(this, event)">Bảng giá</a>
      <a href="#"               data-page="pages/contact.json"   onclick="switchPage(this, event)">Liên hệ</a>
    </nav>
    <div class="header-right">
      <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
      <a class="nav-cta" href="#" data-page="pages/products.json" onclick="switchPage(this, event)">Dùng thử miễn phí</a>
    </div>
  </header>

  <main>
    <div id="app"></div>
  </main>

  <footer>
    <p>© 2026 WidgetData. Mọi quyền được bảo lưu. &nbsp;|&nbsp;
      <a href="dashboard.html">Dashboard</a>
    </p>
  </footer>

  <script src="lib/widget-engine.js"></script>
  <script>
    // Public landing pages – no auth required
    WidgetEngine.init({ baseUrl: '' });

    // Load the home landing page on startup
    WidgetEngine.page.load('pages/home.json', document.getElementById('app'));

    function switchPage(link, e) {
      e.preventDefault();
      document.querySelectorAll('header nav a, header .nav-cta').forEach(a => a.classList.remove('active'));
      link.classList.add('active');
      WidgetEngine.page.load(link.dataset.page, document.getElementById('app'))
        .then(() => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }
  </script>

</body>
</html>
